name: criteo_terabyte_ctr
data:
  name: criteo_terabyte
  data_base_path: "./datasets"
  days: ["day_0"]
  max_rows: 1000000
  train_split: 0.8
  label_column: label
  batch_size: 4096
  features:
    - {name: user_id, source_name: cat_1, type: CATEGORICAL, role: user}
    - {name: item_id, source_name: cat_2, type: CATEGORICAL, role: item}
eval:
  n_negatives: 100
  seed: 42
