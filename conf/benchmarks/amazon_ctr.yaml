name: amazon_ctr
data:
  name: amazon
  data_base_path: "./datasets"
  category: all_beauty
  max_rows: null
  train_split: 0.8
  label_column: rating
  label_threshold: 4.0
  batch_size: 4096
  num_workers: 0
  features:
    - {name: user_id, source_name: user_id, type: CATEGORICAL, role: user}
    - {name: item_id, source_name: item_id, type: CATEGORICAL, role: item}
    - {name: store, source_name: store, type: CATEGORICAL, role: item}
eval:
  n_negatives: 100
  seed: 42
