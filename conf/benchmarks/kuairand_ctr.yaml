name: kuairand_ctr
data:
  name: kuairand
  data_base_path: "./datasets"
  variant: pure
  train_split: 0.8
  label_column: is_click
  batch_size: 4096
  num_workers: 0
  features:
    - {name: user_id, source_name: user_id, type: CATEGORICAL, role: user}
    - {name: item_id, source_name: video_id, type: CATEGORICAL, role: item}
eval:
  n_negatives: 100
  seed: 42
