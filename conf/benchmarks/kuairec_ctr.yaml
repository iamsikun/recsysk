name: kuairec_ctr
data:
  name: kuairec
  # ``./datasets`` is the convention; the loader resolves to the
  # repo-root ``datasets/`` if this path does not exist locally and
  # downloads the archive there on first use.
  data_base_path: "./datasets"
  variant: small
  train_split: 0.8
  watch_ratio_threshold: 2.0
  batch_size: 4096
  num_workers: 0
  features:
    - {name: user_id, source_name: user_id, type: CATEGORICAL, role: user}
    - {name: item_id, source_name: video_id, type: CATEGORICAL, role: item}
eval:
  n_negatives: 100
  seed: 42
