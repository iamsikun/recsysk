name: taobao_ad_ctr
data:
  name: taobao_ad
  data_base_path: "./datasets"
  train_split: 0.8
  label_column: clk
  batch_size: 4096
  features:
    - {name: user_id, source_name: user, type: CATEGORICAL, role: user}
    - {name: item_id, source_name: adgroup_id, type: CATEGORICAL, role: item}
eval:
  n_negatives: 100
  seed: 42
