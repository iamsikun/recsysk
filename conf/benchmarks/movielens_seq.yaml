name: movielens_seq
data:
  name: movielens
  data_base_path: "./datasets"
  dataset_size: "20m"
  train_split: 0.8
  rating_threshold: 4
  batch_size: 2048
  model_input: sequence
  item_feature: item_id
  history_feature: hist_item_id
  max_history_len: 20
  sparse_feature_names: [user_id]
  features:
    - {name: user_id, source_name: user_id, type: CATEGORICAL, role: user}
    - {name: item_id, source_name: item_id, type: CATEGORICAL, role: item}
eval:
  n_negatives: 100
  seed: 42
