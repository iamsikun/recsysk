seed: 42

data:
  name: movielens
  data_base_path: "./datasets"
  dataset_size: "20m"
  train_split: 0.8
  rating_threshold: 4
  num_workers: auto
  pin_memory: false
  batch_size: 2048
  model_input: sequence
  item_feature: item_id
  history_feature: hist_item_id
  max_history_len: 20
  sparse_feature_names: [user_id]
  features:
    - name: user_id
      source_name: user_id
      type: CATEGORICAL
      role: user
    - name: item_id
      source_name: item_id
      type: CATEGORICAL
      role: item

model:
  name: din
  embed_dim: 16
  mlp_dims: [128, 64]
  item_feature: item_id
  history_feature: hist_item_id
  sparse_feature_names: [user_id]
  attention_mlp_dims: [64, 32]
  dropout: 0.1

optimizer:
  name: adamw
  lr: 0.001

loss:
  name: binary_cross_entropy_with_logits

trainer:
  max_epochs: 2
  accelerator: gpu
  devices: 1
  log_every_n_steps: 1
